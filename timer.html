<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYR Recruitment | Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 30px; border: 2px solid #f1c40f;
            width: 90%; max-width: 500px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* สไตล์ส่วนหัวใหม่ */
        .header-section { margin-bottom: 30px; }
        .hyr-logo {
            width: 100%; max-width: 150px; /* ปรับขนาดโลโก้ด้านบน */
            border-radius: 10px; margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .hyr-title {
            color: #f1c40f; font-size: 1.8rem; font-weight: 600;
            margin: 0; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
        }

        /* สไตล์เนื้อหาเดิม */
        .logo-img { width: 100%; max-width: 180px; border-radius: 15px; margin-bottom: 20px; }
        #countdown {
            font-size: 2.5rem; font-weight: 600; color: #f1c40f;
            margin: 20px 0; text-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
            display: flex; justify-content: center; gap: 15px;
        }
        .time-block { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; min-width: 70px; }
        .time-label { font-size: 0.8rem; color: #ccc; display: block; font-weight: 300; }
        .status-tag {
            display: inline-block; padding: 5px 20px; background: #ff4757;
            border-radius: 50px; font-size: 0.9rem; margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">
    
    <div class="header-section animate__animated animate__fadeInDown animate__delay-1s">
        <img src="hyr-logo.png" alt="HYR Logo" class="hyr-logo">
        <h1 class="hyr-title">HAT YAI RAILWAYS</h1>
    </div>

    <div class="animate__animated animate__zoomIn">
        <div class="status-tag animate__animated animate__flash animate__infinite animate__slow">ระบบเตรียมเปิดรับสมัคร</div>
        <p style="color: #bdc3c7;">ระบบจะเปิดรับสมัครอย่างเป็นทางการในวันที่<br>5 พฤษภาคม เวลา 08:00 น.</p>

        <div id="countdown">
            <div class="time-block"><span id="days">00</span><span class="time-label">วัน</span></div>
            <div class="time-block"><span id="hours">00</span><span class="time-label">ชม.</span></div>
            <div class="time-block"><span id="minutes">00</span><span class="time-label">นาที</span></div>
            <div class="time-block"><span id="seconds">00</span><span class="time-label">วิ</span></div>
        </div>

        <p id="ready-msg" style="display: none; color: #2ed573; font-size: 1.5rem; font-weight: 600;" class="animate__animated animate__bounce">
            🚀 เปิดรับสมัครแล้ว! ตรวจสอบลิงก์ใน Discord
        </p>
    </div>
</div>

<script>
    // ตั้งค่าเป้าหมาย: วันที่ 5 พฤษภาคม 2026 เวลา 08:00:00
    const targetDate = new Date("May 5, 2026 08:00:00").getTime();

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        // คำนวณ วัน, ชม, นาที, วิ
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // แสดงผล
        document.getElementById("days").innerText = days.toString().padStart(2, '0');
        document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
        document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
        document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

        // เมื่อถึงเวลา
        if (distance < 0) {
            clearInterval(timer);
            document.getElementById("countdown").style.display = "none";
            document.querySelector(".status-tag").style.background = "#2ed573";
            document.querySelector(".status-tag").innerText = "OPEN NOW";
            document.getElementById("ready-msg").style.display = "block";
        }
    }, 1000);
</script>

</body>
</html>
